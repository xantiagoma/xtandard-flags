name: Release

# Publishes to npm when a version tag is pushed (e.g. v0.1.0).
#
# First release:    git tag v0.1.0 && git push origin v0.1.0
# Ongoing releases: bun run release   (changelogen bumps from conventional
#                   commits, writes CHANGELOG.md, commits, tags, and pushes —
#                   which triggers this workflow).
#
# Requires the NPM_TOKEN secret: an npm automation token with publish rights to
# the @xtandard scope.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package
        run: bunx publint

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
