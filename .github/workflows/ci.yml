name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test (unit + integration, incl. live Redis)
        run: bun run test

      - name: Build library + UI
        run: bun run build

      - name: publint
        run: bunx publint

      - name: Pack check
        run: bun pm pack --dry-run

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Browser e2e (bundled UI)
        run: bun run test:e2e
        env:
          CI: "true"
